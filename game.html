<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My Web Page | Game</title>
        <link rel="icon" href="photos/favicon.ico">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Randomizer</h1>
            <nav>
                <div class="Home">
                    <a href="index.html">HOME</a>
                    <a href="game.html">GAME</a>
                    <a href="user.html">ACCOUNT</a>
                </div>
            </nav>
        </header>
        
        <div id="GuessesNum">
            <h3>Previous guesses</h3>
            <ul id="Numbers"></ul>
        </div>

        <div id="GameStart">
            <button id="Generate" onclick="generateNumber()">Generate number</button>
            <p id="StartGame">To start the game, click the "Generate number".</p>
        </div>

        <div id="EnterNumber">
            <input type="text" id="numberInput" placeholder="Enter the number from 1 to 100">
            <button id="Submit" onclick="checkNumber()">Submit</button>
        </div>

        <p id="resultText"></p>

        <script src="script.js"></script>
    </body>
</html>
